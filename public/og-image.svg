<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="150" r="200" fill="rgba(37,99,235,0.1)"/>
  <circle cx="300" cy="500" r="150" fill="rgba(124,58,237,0.08)"/>
  <circle cx="1050" cy="450" r="100" fill="rgba(6,182,212,0.06)"/>

  <!-- Accent line -->
  <rect x="100" y="280" width="80" height="4" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Title -->
  <text x="100" y="350" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1">
    星谷的技术博客
  </text>

  <!-- Subtitle -->
  <text x="100" y="420" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)" font-weight="400">
    前端开发 · 编程技巧 · 技术见解
  </text>

  <!-- Tags -->
  <rect x="100" y="460" width="80" height="32" rx="16" fill="rgba(37,99,235,0.2)" stroke="rgba(37,99,235,0.4)" stroke-width="1"/>
  <text x="140" y="481" font-family="'Inter', sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="500">Astro</text>

  <rect x="190" y="460" width="60" height="32" rx="16" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="220" y="481" font-family="'Inter', sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="500">Vue</text>

  <rect x="260" y="460" width="100" height="32" rx="16" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
  <text x="310" y="481" font-family="'Inter', sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle" font-weight="500">TypeScript</text>

  <!-- Logo mark -->
  <g transform="translate(1050, 100)">
    <rect width="60" height="60" rx="12" fill="url(#accent)" opacity="0.9"/>
    <path d="M15 22L30 15L45 22V38L30 45L15 38V22Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M30 15V45" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M15 22L30 29L45 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- URL -->
  <text x="100" y="560" font-family="'JetBrains Mono', monospace" font-size="16" fill="rgba(255,255,255,0.4)">
    xinggu.com
  </text>
</svg>
