name: Fetch Subscriptions

on:
  schedule:
    # 每小时检查源仓库是否有更新，有更新才部署
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-subs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check repos and fetch if changed
        id: fetch
        run: node scripts/fetch-all-subs.js

      - name: Commit and push changes
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/content/blog/zh/ scripts/.sub-state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Update subscriptions $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Build site
        if: steps.fetch.outputs.changed == 'true'
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        if: steps.fetch.outputs.changed == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: xinggu-blog
          directory: dist
