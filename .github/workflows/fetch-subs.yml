name: Fetch V2Ray/Clash Subscriptions

on:
  schedule:
    # 每8小时检查一次（:35分）
    - cron: '35 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-subs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # V2Ray/Clash 订阅：每8小时定时抓取
      - name: Fetch V2Ray/Clash subscriptions
        run: node scripts/fetch-subs.js

      - name: Check for changes
        id: changes
        run: |
          count=$(git status --porcelain src/content/blog/zh/sub/ | wc -l)
          echo "has_changes=$count" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase
          git add src/content/blog/zh/sub/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Update V2Ray/Clash subscriptions $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Build site
        if: steps.changes.outputs.has_changes != '0'
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.has_changes != '0'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: xinggu-blog
          directory: dist
