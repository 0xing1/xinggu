name: Daily News Update

on:
  schedule:
    # 每天早上 0:00 UTC (北京时间 8:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write  # 允许 git push

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate daily news
        run: node scripts/fetch-news.js

      - name: Check for changes
        id: changes
        run: |
          git status --porcelain src/content/blog/
          echo "has_changes=$(git status --porcelain src/content/blog/ | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/content/blog/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📰 Daily news update $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Build site
        if: steps.changes.outputs.has_changes != '0'
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.has_changes != '0'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: xinggu-blog
          directory: dist
