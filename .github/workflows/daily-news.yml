name: Daily News Update

on:
  schedule:
    # 每天早上 8:00 UTC (北京时间 16:00) 运行
    - cron: '0 8 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily news
        run: node scripts/fetch-news.js

      - name: Check for changes
        id: changes
        run: |
          git status --porcelain
          echo "has_changes=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/content/blog/zh/news/ src/content/blog/en/news/
          git commit -m "📰 Daily news update $(date +'%Y-%m-%d')"
          git push

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.has_changes != '0'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=xinggu-blog
