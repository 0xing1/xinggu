name: Fetch Mibei Daily Nodes

on:
  schedule:
    # 每天 03:30 UTC (北京时间 11:30) 运行
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-mibei:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fetch mibei daily nodes
        run: node scripts/fetch-mibei.js

      - name: Check for changes
        id: changes
        run: |
          count=$(git status --porcelain src/content/blog/zh/mibei/ | wc -l)
          echo "has_changes=$count" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase --autostash
          git add src/content/blog/zh/mibei/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Update mibei nodes $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Build site
        if: steps.changes.outputs.has_changes != '0'
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.has_changes != '0'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: xinggu-blog
          directory: dist
